
#  La Reina del Huevo - Configuración
# =============================================

# Puerto del servidor
server.port=8080

# ----- Base de datos H2 (en memoria) -----
spring.datasource.url=jdbc:h2:mem:avicoladb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola web H2 (abre en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# No cargar datos iniciales - base de datos vacía
# spring.sql.init.mode=always

# ----- CORS: permite peticiones desde React -----
app.cors.allowed-origins=http://localhost:5173
