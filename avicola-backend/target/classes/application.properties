# =====================================================
#  La Reina del Huevo - Configuración del Backend
# =====================================================

# Puerto en el que corre el servidor
server.port=8080

# ─── Base de datos MySQL ───────────────────────────
# Configuración para XAMPP MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/la_reina_huevo_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ──────────────────────────────
# update: mantiene los datos existentes y solo actualiza la estructura
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Datos de prueba ──────────────────────────────
# Deshabilitado para empezar con base de datos vacía
# spring.sql.init.mode=always

# ─── JSON: usa snake_case en las respuestas ───────
# Esto hace que Java "fechaPuesta" → JSON "fecha_puesta"
# Así el frontend recibe exactamente los nombres que espera
spring.jackson.property-naming-strategy=SNAKE_CASE

# ─── CORS: permite peticiones del frontend ─────────
app.cors.allowed-origins=http://localhost:5173
