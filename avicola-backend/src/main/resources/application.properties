# =====================================================
#  La Reina del Huevo - Configuración del Backend
# =====================================================

# Puerto en el que corre el servidor
server.port=8080

# ─── Base de datos MySQL ───────────────────────────
# Cambia "root" y "tu_password" por tus credenciales
spring.datasource.url=jdbc:mysql://localhost:3306/avicola_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ──────────────────────────────
# create-drop: crea las tablas al iniciar, las borra al cerrar (bueno para desarrollo)
# update: solo actualiza la estructura sin borrar datos (usar en producción)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ─── Datos de prueba ──────────────────────────────
# Ejecuta src/main/resources/data.sql al iniciar (solo con create-drop)
spring.sql.init.mode=always

# ─── JSON: usa snake_case en las respuestas ───────
# Esto hace que Java "fechaPuesta" → JSON "fecha_puesta"
# Así el frontend recibe exactamente los nombres que espera
spring.jackson.property-naming-strategy=SNAKE_CASE

# ─── CORS: permite peticiones del frontend ─────────
app.cors.allowed-origins=http://localhost:5173
